<!-- Schedules Tab (Automatizaciones) -->
<section id="schedules" class="tab-content">
    <div class="schedules-section">
        <div class="section-header">
            <h3>Automatizaciones</h3>
            <button class="btn btn-primary" onclick="openScheduleModal()">+ Nueva Automatización</button>
        </div>
        <div class="automations-container">
            <div class="automations-list">
                <div id="automationsListContainer" class="automations-items">
                    <div class="loading">Cargando automatizaciones...</div>
                </div>
            </div>
            <div class="automations-diagram">
                <div id="diagramContainer" class="diagram-content">
                    <div class="diagram-placeholder">
                        Selecciona una automatización para ver el flujo de pasos
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
